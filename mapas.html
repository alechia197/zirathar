  <meta name="description" content="Mapas del mundo de Zirathar: los cinco reinos y sus zonas, desde las capitales hasta Kael'Zar.">
  <link rel="stylesheet" href="css/estilos.css">
  <style>
    .page-header { padding-top: 80px; text-align: center; padding-bottom: 1rem; }
    .mapas-container { max-width: 1100px; margin: 0 auto; padding: 0 2rem 4rem; }

    /* Selector de reino */
    .reino-selector { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .reino-btn { padding: 0.6rem 1.2rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; background: rgba(255,255,255,0.03); cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.85rem; color: #aaa; transition: all 0.3s; }
    .reino-btn:hover { border-color: rgba(200,134,10,0.5); color: #fff; }
    .reino-btn.active { border-color: var(--dorado); color: var(--dorado); background: rgba(200,134,10,0.1); }

    /* Zona tabs */
    .zona-tabs { display: flex; gap: 0.3rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .zona-tab { padding: 0.4rem 0.8rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; background: rgba(255,255,255,0.02); cursor: pointer; font-size: 0.8rem; color: #888; transition: all 0.3s; }
    .zona-tab:hover { color: #ccc; border-color: rgba(255,255,255,0.2); }
    .zona-tab.active { color: #fff; border-color: var(--dorado); background: rgba(200,134,10,0.08); }

    /* Historia de zona */
    .zona-header { margin-bottom: 1.5rem; }
    .zona-title { font-family: 'Cinzel Decorative', serif; font-size: 1.3rem; color: var(--dorado); margin-bottom: 0.3rem; }
    .zona-nivel { font-size: 0.8rem; opacity: 0.5; margin-bottom: 0.8rem; }
    .zona-lore { font-size: 0.9rem; line-height: 1.7; opacity: 0.8; margin-bottom: 1rem; }
    .zona-pista { background: rgba(200,134,10,0.06); border-left: 3px solid rgba(200,134,10,0.4); padding: 0.8rem 1rem; border-radius: 0 6px 6px 0; font-style: italic; font-size: 0.85rem; margin-bottom: 1rem; }
    .zona-pista-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--dorado); opacity: 0.7; display: block; margin-bottom: 0.2rem; font-style: normal; }
    .zona-raza-info { font-size: 0.85rem; opacity: 0.6; margin-bottom: 1.5rem; }
    .zona-raza-info strong { color: var(--dorado); }

    /* Mapa de salas */
    .mapa-grid { position: relative; overflow-x: auto; overflow-y: auto; max-height: 600px; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; background: rgba(0,0,0,0.3); padding: 2rem; }
    .mapa-canvas { position: relative; min-width: 100%; min-height: 400px; }

    .sala-node { position: absolute; width: 14px; height: 14px; border-radius: 3px; cursor: pointer; transition: all 0.2s; z-index: 2; }
    .sala-node:hover { transform: scale(1.8); z-index: 10; }
    .sala-node.segura { border: 2px solid rgba(39,174,96,0.8); }

    .sala-tooltip { display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); border: 1px solid rgba(200,134,10,0.4); border-radius: 4px; padding: 0.4rem 0.6rem; white-space: nowrap; font-size: 0.75rem; color: #ddd; z-index: 100; pointer-events: none; }
    .sala-node:hover .sala-tooltip { display: block; }

    .exit-line { position: absolute; background: rgba(255,255,255,0.12); z-index: 1; }

    /* Areas legend */
    .areas-legend { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .area-chip { font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 3px; display: flex; align-items: center; gap: 0.3rem; }
    .area-dot { width: 8px; height: 8px; border-radius: 2px; }

    /* Stats */
    .zona-stats { display: flex; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap; }
    .stat-item { font-size: 0.8rem; opacity: 0.5; }
    .stat-item strong { color: var(--dorado); opacity: 1; }

    /* Empty state */
    .empty-msg { text-align: center; padding: 3rem; opacity: 0.4; font-style: italic; }

    @media (max-width: 600px) {
      .reino-btn { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
      .mapa-grid { max-height: 400px; }
    }
  </style>

const AREA_COLORS = [
  "#e74c3c","#27ae60","#3498db","#e67e22","#8e44ad",
  "#f1c40f","#1abc9c","#e91e63","#00bcd4","#ff5722",
  "#9c27b0","#4caf50","#ff9800","#607d8b","#795548",
  "#cddc39","#03a9f4","#9e9e9e","#ffeb3b","#8bc34a"
];

let mapData = {};
let currentReino = "humanos";
let currentZona = 0;

async function init() {
  try {
    const resp = await fetch("data/mapas.json");
    mapData = await resp.json();
  } catch(e) {
    document.getElementById("zonaContent").innerHTML = '<p class="empty-msg">No se pudieron cargar los datos del mapa.</p>';
    return;
  }
  renderReinoSelector();
  selectReino("humanos");
}

function renderReinoSelector() {
  const container = document.getElementById("reinoSelector");
  container.innerHTML = "";
  for (const [key, info] of Object.entries(REINOS)) {
    const btn = document.createElement("button");
    btn.className = "reino-btn";
    btn.dataset.reino = key;
    btn.textContent = `${info.icon} ${info.nombre}`;
    btn.style.borderColor = `${info.color}40`;
    btn.onclick = () => selectReino(key);
    container.appendChild(btn);
  }
}

function selectReino(reino) {
  currentReino = reino;
  document.querySelectorAll(".reino-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.reino === reino);
    if (b.dataset.reino === reino) {
      b.style.borderColor = REINOS[reino].color;
      b.style.color = REINOS[reino].color;
    } else {
      b.style.borderColor = "rgba(255,255,255,0.1)";
      b.style.color = "#aaa";
    }
  });

  // Buscar zonas disponibles para este reino
  const zonas = [];
  for (const key of Object.keys(mapData)) {
    if (key.startsWith(reino + "_z")) {
      const z = parseInt(key.split("_z")[1]);
      if (!zonas.includes(z)) zonas.push(z);
    }
  }
  zonas.sort((a,b) => a - b);

  renderZonaTabs(zonas);
  if (zonas.length > 0) selectZona(zonas[0]);
}

function renderZonaTabs(zonas) {
  const container = document.getElementById("zonaTabs");
  container.innerHTML = "";
  const nombres = ["Capital","Zona 1","Zona 2","Zona 3","Zona 4","Zona 5"];
  for (const z of zonas) {
    const tab = document.createElement("button");
    tab.className = "zona-tab";
    tab.dataset.zona = z;
    tab.textContent = nombres[z] || `Zona ${z}`;
    tab.onclick = () => selectZona(z);
    container.appendChild(tab);
  }
}

function selectZona(z) {
  currentZona = z;
  document.querySelectorAll(".zona-tab").forEach(t => t.classList.toggle("active", parseInt(t.dataset.zona) === z));
  renderZona();
}

function renderZona() {
  const key = `${currentReino}_z${currentZona}`;
  const data = mapData[key];
  const lore = ZONA_LORE[key] || {};
  const reinoInfo = REINOS[currentReino];
  const container = document.getElementById("zonaContent");

  if (!data || data.salas.length === 0) {
    container.innerHTML = '<p class="empty-msg">Esta zona aun no ha sido cartografiada.</p>';
    return;
  }

  // Header con lore
  let html = '<div class="zona-header">';
  html += `<h2 class="zona-title" style="color:${reinoInfo.color}">${lore.titulo || key}</h2>`;
  html += `<p class="zona-nivel">${lore.nivel || ""}</p>`;
  if (lore.lore) html += `<p class="zona-lore">${lore.lore}</p>`;
  if (lore.pista) {
    html += `<div class="zona-pista"><span class="zona-pista-label">Pista del mundo</span>${lore.pista}</div>`;
  }
  if (lore.razas) html += `<p class="zona-raza-info"><strong>Movimiento:</strong> ${lore.razas}</p>`;
  html += '</div>';

  // Stats
  const areas = [...new Set(data.salas.map(s => s.area).filter(a => a))];
  html += '<div class="zona-stats">';
  html += `<span class="stat-item"><strong>${data.salas.length}</strong> salas</span>`;
  html += `<span class="stat-item"><strong>${areas.length}</strong> areas</span>`;
  const seguras = data.salas.filter(s => s.zona_segura).length;
  if (seguras > 0) html += `<span class="stat-item"><strong>${seguras}</strong> salas seguras</span>`;
  html += '</div>';

  // Mapa
  html += '<div class="mapa-grid"><div class="mapa-canvas" id="mapaCanvas"></div></div>';

  // Leyenda de areas
  if (areas.length > 0) {
    html += '<div class="areas-legend">';
    areas.forEach((a, i) => {
      const color = AREA_COLORS[i % AREA_COLORS.length];
      html += `<span class="area-chip"><span class="area-dot" style="background:${color}"></span>${a}</span>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;

  // Renderizar nodos del mapa
  setTimeout(() => renderMapNodes(data, areas), 50);
}

function renderMapNodes(data, areas) {
  const canvas = document.getElementById("mapaCanvas");
  if (!canvas) return;

  const salas = data.salas;
  const idMap = {};
  salas.forEach(s => { idMap[s.id] = s; });

  // Layout por BFS desde la primera sala
  const positions = {};
  const visited = new Set();
  const queue = [];
  const SPACING = 35;

  // Empezar desde la primera sala
  const start = salas[0];
  positions[start.id] = { x: 0, y: 0 };
  visited.add(start.id);
  queue.push(start);

  const DIR_OFFSETS = {
    norte: {x:0,y:-1}, sur: {x:0,y:1}, este: {x:1,y:0}, oeste: {x:-1,y:0},
    noreste: {x:1,y:-1}, noroeste: {x:-1,y:-1}, sureste: {x:1,y:1}, suroeste: {x:-1,y:1},
    arriba: {x:0,y:-1}, abajo: {x:0,y:1},
    n:{x:0,y:-1}, s:{x:0,y:1}, e:{x:1,y:0}, o:{x:-1,y:0},
    ne:{x:1,y:-1}, no:{x:-1,y:-1}, se:{x:1,y:1}, so:{x:-1,y:1},
    ar:{x:0,y:-1}, ab:{x:0,y:1},
  };

  while (queue.length > 0) {
    const sala = queue.shift();
    const pos = positions[sala.id];

    for (const exit of sala.exits) {
      if (visited.has(exit.dest_id)) continue;
      if (!idMap[exit.dest_id]) continue;

      const offset = DIR_OFFSETS[exit.dir] || {x:1,y:0};
      let nx = pos.x + offset.x;
      let ny = pos.y + offset.y;

      // Evitar colisiones
      const posKey = `${nx},${ny}`;
      let tries = 0;
      while (Object.values(positions).some(p => p.x === nx && p.y === ny) && tries < 8) {
        nx += (Math.random() > 0.5 ? 1 : -1);
        ny += (Math.random() > 0.5 ? 1 : -1);
        tries++;
      }

      positions[exit.dest_id] = { x: nx, y: ny };
      visited.add(exit.dest_id);
      queue.push(idMap[exit.dest_id]);
    }
  }

  // Salas sin posicion (desconectadas) — colocar abajo
  let extraY = Math.max(...Object.values(positions).map(p => p.y), 0) + 2;
  let extraX = 0;
  salas.forEach(s => {
    if (!positions[s.id]) {
      positions[s.id] = { x: extraX, y: extraY };
      extraX++;
      if (extraX > 10) { extraX = 0; extraY++; }
    }
  });

  // Normalizar posiciones
  const minX = Math.min(...Object.values(positions).map(p => p.x));
  const minY = Math.min(...Object.values(positions).map(p => p.y));
  const maxX = Math.max(...Object.values(positions).map(p => p.x));
  const maxY = Math.max(...Object.values(positions).map(p => p.y));

  Object.values(positions).forEach(p => {
    p.x = (p.x - minX) * SPACING + 30;
    p.y = (p.y - minY) * SPACING + 30;
  });

  const width = (maxX - minX) * SPACING + 60;
  const height = (maxY - minY) * SPACING + 60;
  canvas.style.width = width + "px";
  canvas.style.height = height + "px";

  const reinoColor = REINOS[currentReino].color;

  // Dibujar lineas de conexion
  salas.forEach(sala => {
    const pos = positions[sala.id];
    if (!pos) return;
    sala.exits.forEach(exit => {
      const destPos = positions[exit.dest_id];
      if (!destPos) return;

      const dx = destPos.x - pos.x;
      const dy = destPos.y - pos.y;
      const len = Math.sqrt(dx*dx + dy*dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;

      const line = document.createElement("div");
      line.className = "exit-line";
      line.style.left = (pos.x + 7) + "px";
      line.style.top = (pos.y + 7) + "px";
      line.style.width = len + "px";
      line.style.height = "1px";
      line.style.transformOrigin = "0 0";
      line.style.transform = `rotate(${angle}deg)`;
      canvas.appendChild(line);
    });
  });

  // Dibujar nodos
  salas.forEach(sala => {
    const pos = positions[sala.id];
    if (!pos) return;

    const areaIdx = areas.indexOf(sala.area);
    const color = areaIdx >= 0 ? AREA_COLORS[areaIdx % AREA_COLORS.length] : reinoColor;

    const node = document.createElement("div");
    node.className = "sala-node" + (sala.zona_segura ? " segura" : "");
    node.style.left = pos.x + "px";
    node.style.top = pos.y + "px";
    node.style.background = color;

    const tooltip = document.createElement("div");
    tooltip.className = "sala-tooltip";
    tooltip.textContent = sala.nombre + (sala.area ? ` (${sala.area})` : "");
    node.appendChild(tooltip);

    canvas.appendChild(node);
  });
}

document.addEventListener("DOMContentLoaded", init);
  </script>
